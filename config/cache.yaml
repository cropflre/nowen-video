# ==================== 缓存配置 ====================
# 文件: config/cache.yaml
# 说明: 转码缓存目录、磁盘限额、过期策略和自动清理

# 转码缓存目录
# 存放转码产生的 HLS 分片、临时文件等
# 建议使用高速磁盘（SSD）以提升转码性能
# 默认: ./cache
cache_dir: ./cache

# 缓存最大占用磁盘空间（MB）
# 超过限额后将自动清理最久未访问的缓存文件
# 设为 0 表示不限制
# 默认: 0（不限制）
max_disk_usage_mb: 0

# 缓存文件过期时间（小时）
# 超过此时间未被访问的缓存文件标记为可清理
# 设为 0 表示永不过期
# 默认: 0（不过期）
ttl_hours: 0

# 是否启用自动清理过期缓存
# 启用后将按照 cleanup_interval_min 的间隔定期清理
# 默认: false
auto_cleanup: false

# 自动清理间隔（分钟）
# 每隔指定时间检查并清理过期缓存
# 默认: 60
cleanup_interval_min: 60
