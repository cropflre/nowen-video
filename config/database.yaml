# ==================== 数据库配置 ====================
# 文件: config/database.yaml
# 说明: 数据库连接参数配置
# 提示: 修改后需重启服务生效

# 数据库文件路径
# 相对路径将基于 app.data_dir 解析
# 默认: ./data/nowen.db
db_path: ./data/nowen.db

# 是否启用 WAL (Write-Ahead Logging) 模式
# WAL 模式提供更好的并发读写性能，强烈建议保持开启
# 默认: true
wal_mode: true

# SQLite 繁忙超时（毫秒）
# 当数据库被锁定时，等待释放的最大时间
# 默认: 5000
busy_timeout: 5000

# SQLite 页面缓存大小
# 负数表示以 KB 为单位（如 -20000 表示 ~20MB 缓存）
# 正数表示页面数量
# 默认: -20000
cache_size: -20000

# 最大打开连接数
# SQLite 建议设为 1，避免并发写入冲突
# 默认: 1
max_open_conns: 1

# 最大空闲连接数
# 默认: 1
max_idle_conns: 1
