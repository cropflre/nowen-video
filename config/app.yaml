cors_origins: []
data_dir: ./data
debug: false
env: production
ffmpeg_path: C:\ffmpeg\bin\ffmpeg.exe
ffprobe_path: C:\ffmpeg\bin\ffprobe.exe
gpu_monitor_interval: 5
gpu_recovery_threshold: 60
gpu_safety_enabled: true
gpu_temperature_recovery: 70
gpu_temperature_threshold: 80
gpu_utilization_threshold: 85
hw_accel: nvenc
max_transcode_jobs: 2
port: 8080
resource_limit: 70
transcode_preset: veryfast
vaapi_device: /dev/dri/renderD128
web_dir: ./web/dist
