# Nowen Video Android V2 signed release build
#
# Triggers:
#  1. Pull request touching Android V2 release files -> ephemeral-key signing smoke test
#  2. Push tag android-v2-v*.*.*                 -> signed APK/AAB + draft GitHub Release
#  3. workflow_dispatch                           -> signed APK/AAB artifact only
#
# Required repository secrets for tag/manual builds:
#  - ANDROID_V2_KEYSTORE_BASE64
#  - ANDROID_V2_KEYSTORE_PASSWORD
#  - ANDROID_V2_KEY_ALIAS
#  - ANDROID_V2_KEY_PASSWORD
name: release-android-v2

on:
  pull_request:
    paths:
      - 'clients/android-v2/**'
      - 'android/gradlew'
      - 'android/gradlew.bat'
      - 'android/gradle/wrapper/**'
      - '.github/workflows/release-android-v2.yml'
  push:
    tags:
      - 'android-v2-v*.*.*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Android version name, for example 0.1.0-rc.1'
        required: true
        default: '0.1.0-rc.1'
      version_code:
        description: 'Positive Android version code'
        required: true
        default: '1'

permissions:
  contents: read

concurrency:
  group: release-android-v2-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build signed Android V2
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
    env:
      ANDROID_V2_KEYSTORE_BASE64: ${{ secrets.ANDROID_V2_KEYSTORE_BASE64 }}
      ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_V2_KEYSTORE_PASSWORD }}
      ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_V2_KEY_ALIAS }}
      ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_V2_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Resolve Android version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            version_name="0.0.0-ci"
            version_code="1"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version_name="${GITHUB_REF_NAME#android-v2-v}"
            core_version="${version_name%%-*}"
            IFS='.' read -r major minor patch <<< "$core_version"
            if [[ ! "$major" =~ ^[0-9]+$ || ! "$minor" =~ ^[0-9]+$ || ! "$patch" =~ ^[0-9]+$ ]]; then
              echo "Tag must use android-v2-vMAJOR.MINOR.PATCH with an optional suffix."
              exit 1
            fi
            version_code=$((10#$major * 1000000 + 10#$minor * 1000 + 10#$patch))
          else
            version_name='${{ inputs.version_name }}'
            version_code='${{ inputs.version_code }}'
          fi

          if [[ ! "$version_name" =~ ^[0-9A-Za-z][0-9A-Za-z._-]*$ ]]; then
            echo "Invalid Android version name: $version_name"
            exit 1
          fi
          if [[ ! "$version_code" =~ ^[1-9][0-9]*$ ]]; then
            echo "Android version code must be a positive integer."
            exit 1
          fi

          echo "ANDROID_VERSION_NAME=$version_name" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION_CODE=$version_code" >> "$GITHUB_ENV"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "Resolved Android V2 version $version_name ($version_code)"

      - name: Prepare signing key
        shell: bash
        run: |
          set -euo pipefail

          store_file="$RUNNER_TEMP/nowen-video-android-v2-release.jks"
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            keytool -genkeypair -noprompt \
              -keystore "$store_file" \
              -storepass android-ci \
              -keypass android-ci \
              -alias android-v2-ci \
              -keyalg RSA \
              -keysize 2048 \
              -validity 1 \
              -dname "CN=Nowen Video Android V2 CI, OU=CI, O=Nowen, L=CI, S=CI, C=US"
            echo "ANDROID_SIGNING_STORE_PASSWORD=android-ci" >> "$GITHUB_ENV"
            echo "ANDROID_SIGNING_KEY_ALIAS=android-v2-ci" >> "$GITHUB_ENV"
            echo "ANDROID_SIGNING_KEY_PASSWORD=android-ci" >> "$GITHUB_ENV"
          else
            missing=()
            [[ -n "${ANDROID_V2_KEYSTORE_BASE64:-}" ]] || missing+=(ANDROID_V2_KEYSTORE_BASE64)
            [[ -n "${ANDROID_SIGNING_STORE_PASSWORD:-}" ]] || missing+=(ANDROID_V2_KEYSTORE_PASSWORD)
            [[ -n "${ANDROID_SIGNING_KEY_ALIAS:-}" ]] || missing+=(ANDROID_V2_KEY_ALIAS)
            [[ -n "${ANDROID_SIGNING_KEY_PASSWORD:-}" ]] || missing+=(ANDROID_V2_KEY_PASSWORD)
            if (( ${#missing[@]} > 0 )); then
              printf 'Missing required Android V2 signing secret: %s\n' "${missing[@]}"
              exit 1
            fi
            printf '%s' "$ANDROID_V2_KEYSTORE_BASE64" | base64 --decode > "$store_file"
          fi

          chmod 600 "$store_file"
          echo "ANDROID_SIGNING_STORE_FILE=$store_file" >> "$GITHUB_ENV"

      - name: Test and build signed APK/AAB
        shell: bash
        run: |
          set -euo pipefail
          chmod +x android/gradlew
          ./android/gradlew -p clients/android-v2 \
            clean testDebugUnitTest lintDebug assembleRelease bundleRelease \
            --no-daemon --stacktrace

      - name: Verify signatures and prepare artifacts
        shell: bash
        run: |
          set -euo pipefail

          apk="clients/android-v2/app/build/outputs/apk/release/app-release.apk"
          aab="clients/android-v2/app/build/outputs/bundle/release/app-release.aab"
          [[ -f "$apk" ]] || { echo "Signed APK not found: $apk"; exit 1; }
          [[ -f "$aab" ]] || { echo "Signed AAB not found: $aab"; exit 1; }

          apksigner="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          [[ -x "$apksigner" ]] || { echo "apksigner not found"; exit 1; }
          "$apksigner" verify --verbose --print-certs "$apk"
          jarsigner -verify -strict "$aab"

          mkdir -p dist/android-v2
          cp "$apk" "dist/android-v2/nowen-video-android-v2-${ANDROID_VERSION_NAME}.apk"
          cp "$aab" "dist/android-v2/nowen-video-android-v2-${ANDROID_VERSION_NAME}.aab"
          (
            cd dist/android-v2
            sha256sum *.apk *.aab > SHA256SUMS.txt
          )
          ls -la dist/android-v2

      - name: Upload signed Android V2 artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: nowen-video-android-v2-release
          path: dist/android-v2/*
          if-no-files-found: error
          retention-days: 30

  release:
    name: Create draft Android V2 release
    needs: build
    if: startsWith(github.ref, 'refs/tags/android-v2-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nowen-video-android-v2-release
          path: artifacts

      - name: Create GitHub Release draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          name: Nowen Video Android V2 ${{ needs.build.outputs.version_name }}
          files: artifacts/*
