# Nowen Video Android V2 signed release build
#
# Triggers:
#  1. Pull request touching Android V2 release files -> ephemeral-key signing smoke test
#  2. Push tag android-v2-v*.*.*                 -> signed APK/AAB + draft GitHub Release
#  3. workflow_dispatch                           -> signed APK/AAB artifact only
#
# Required repository secrets for tag/manual builds:
#  - ANDROID_V2_KEYSTORE_BASE64
#  - ANDROID_V2_KEYSTORE_PASSWORD
#  - ANDROID_V2_KEY_ALIAS
#  - ANDROID_V2_KEY_PASSWORD
#  - ANDROID_V2_CERTIFICATE_SHA256
name: release-android-v2

on:
  pull_request:
    paths:
      - 'clients/android-v2/**'
      - 'scripts/android-v2-version.sh'
      - 'scripts/android-v2-release-manifest.py'
      - 'scripts/android-v2-signing-preflight.sh'
      - 'android/gradlew'
      - 'android/gradlew.bat'
      - 'android/gradle/wrapper/**'
      - '.github/workflows/release-android-v2.yml'
  push:
    tags:
      - 'android-v2-v*.*.*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Android version name, for example 0.1.0-rc.1'
        required: true
        default: '0.1.0-rc.1'

permissions:
  contents: read

concurrency:
  group: release-android-v2-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build signed Android V2
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
    env:
      ANDROID_V2_KEYSTORE_BASE64: ${{ secrets.ANDROID_V2_KEYSTORE_BASE64 }}
      ANDROID_V2_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_V2_KEYSTORE_PASSWORD }}
      ANDROID_V2_KEY_ALIAS: ${{ secrets.ANDROID_V2_KEY_ALIAS }}
      ANDROID_V2_KEY_PASSWORD: ${{ secrets.ANDROID_V2_KEY_PASSWORD }}
      ANDROID_V2_CERTIFICATE_SHA256: ${{ secrets.ANDROID_V2_CERTIFICATE_SHA256 }}
      ANDROID_V2_APK: clients/android-v2/app/build/outputs/apk/release/app-release.apk
      ANDROID_V2_AAB: clients/android-v2/app/build/outputs/bundle/release/app-release.aab

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Resolve Android version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/android-v2-version.sh --self-test
          python3 scripts/android-v2-release-manifest.py --self-test
          bash scripts/android-v2-signing-preflight.sh --self-test

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            version_name="0.0.0-alpha.1"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version_name="${GITHUB_REF_NAME#android-v2-v}"
          else
            version_name='${{ inputs.version_name }}'
          fi

          version_code="$(bash scripts/android-v2-version.sh "$version_name")"
          echo "ANDROID_VERSION_NAME=$version_name" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION_CODE=$version_code" >> "$GITHUB_ENV"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "Resolved Android V2 version $version_name ($version_code)"

      - name: Prepare and preflight signing key
        shell: bash
        run: |
          set -euo pipefail

          store_file="$RUNNER_TEMP/nowen-video-android-v2-release.jks"
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            export ANDROID_V2_KEYSTORE_PASSWORD=android-ci
            export ANDROID_V2_KEY_ALIAS=android-v2-ci
            export ANDROID_V2_KEY_PASSWORD=android-ci
            keytool -genkeypair -noprompt \
              -keystore "$store_file" \
              -storepass "$ANDROID_V2_KEYSTORE_PASSWORD" \
              -keypass "$ANDROID_V2_KEY_PASSWORD" \
              -alias "$ANDROID_V2_KEY_ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 1 \
              -dname "CN=Nowen Video Android V2 CI, OU=CI, O=Nowen, L=CI, S=CI, C=US"
          else
            missing=()
            [[ -n "${ANDROID_V2_KEYSTORE_BASE64:-}" ]] || missing+=(ANDROID_V2_KEYSTORE_BASE64)
            [[ -n "${ANDROID_V2_KEYSTORE_PASSWORD:-}" ]] || missing+=(ANDROID_V2_KEYSTORE_PASSWORD)
            [[ -n "${ANDROID_V2_KEY_ALIAS:-}" ]] || missing+=(ANDROID_V2_KEY_ALIAS)
            [[ -n "${ANDROID_V2_KEY_PASSWORD:-}" ]] || missing+=(ANDROID_V2_KEY_PASSWORD)
            [[ -n "${ANDROID_V2_CERTIFICATE_SHA256:-}" ]] || missing+=(ANDROID_V2_CERTIFICATE_SHA256)
            if (( ${#missing[@]} > 0 )); then
              printf 'Missing required Android V2 signing secret: %s\n' "${missing[@]}"
              exit 1
            fi
            printf '%s' "$ANDROID_V2_KEYSTORE_BASE64" | base64 --decode > "$store_file"
          fi

          chmod 600 "$store_file"
          mkdir -p dist/android-v2

          preflight_args=(
            --keystore "$store_file"
            --alias "$ANDROID_V2_KEY_ALIAS"
            --version "$ANDROID_VERSION_NAME"
            --repository "$GITHUB_REPOSITORY"
            --report dist/android-v2/signing-preflight.json
            --skip-git-checks
          )
          if [[ "$GITHUB_EVENT_NAME" != "pull_request" ]]; then
            preflight_args+=(--expected-fingerprint "$ANDROID_V2_CERTIFICATE_SHA256")
          fi
          bash scripts/android-v2-signing-preflight.sh "${preflight_args[@]}"

          {
            echo "ANDROID_SIGNING_STORE_FILE=$store_file"
            echo "ANDROID_SIGNING_STORE_PASSWORD=$ANDROID_V2_KEYSTORE_PASSWORD"
            echo "ANDROID_SIGNING_KEY_ALIAS=$ANDROID_V2_KEY_ALIAS"
            echo "ANDROID_SIGNING_KEY_PASSWORD=$ANDROID_V2_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Test and build signed APK/AAB
        shell: bash
        run: |
          set -euo pipefail
          chmod +x android/gradlew
          ./android/gradlew -p clients/android-v2 \
            clean testDebugUnitTest lintDebug assembleRelease bundleRelease \
            --no-daemon --stacktrace

      - name: Verify APK and AAB signatures
        shell: bash
        run: |
          set -euo pipefail
          [[ -f "$ANDROID_V2_APK" ]] || { echo "Signed APK not found: $ANDROID_V2_APK"; exit 1; }
          [[ -f "$ANDROID_V2_AAB" ]] || { echo "Signed AAB not found: $ANDROID_V2_AAB"; exit 1; }

          apksigner="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          [[ -x "$apksigner" ]] || { echo "apksigner not found"; exit 1; }
          "$apksigner" verify --verbose --print-certs "$ANDROID_V2_APK" | tee "$RUNNER_TEMP/android-v2-apksigner.txt"
          jarsigner -verify "$ANDROID_V2_AAB"

          python3 - <<'PY'
          import os
          import pathlib
          import re

          text = pathlib.Path(os.environ["RUNNER_TEMP"], "android-v2-apksigner.txt").read_text(encoding="utf-8")
          match = re.search(r"certificate SHA-256 digest:\s*([0-9a-fA-F:]+)", text, re.IGNORECASE)
          if match is None:
              raise SystemExit("Unable to resolve APK signing certificate SHA-256")
          actual = match.group(1).replace(":", "").lower()
          expected = os.environ.get("ANDROID_V2_CERTIFICATE_SHA256", "").replace(":", "").lower()
          if os.environ.get("GITHUB_EVENT_NAME") != "pull_request":
              if not re.fullmatch(r"[0-9a-f]{64}", expected):
                  raise SystemExit("Expected Android V2 certificate SHA-256 is invalid")
              if actual != expected:
                  raise SystemExit("Signed APK certificate SHA-256 does not match ANDROID_V2_CERTIFICATE_SHA256")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"ANDROID_V2_APK_CERTIFICATE_SHA256={actual}\n")
          print(f"Signed APK certificate SHA-256: {actual}")
          PY

      - name: Inspect signed APK metadata
        shell: bash
        run: |
          set -euo pipefail

          apkanalyzer="$(find "$ANDROID_HOME" -type f -path '*/bin/apkanalyzer' | sort -V | tail -n 1)"
          if [[ -x "$apkanalyzer" ]]; then
            echo "Reading APK metadata with $apkanalyzer"
            application_id="$("$apkanalyzer" manifest application-id "$ANDROID_V2_APK" | tr -d '\r\n')"
            apk_version_code="$("$apkanalyzer" manifest version-code "$ANDROID_V2_APK" | tr -d '\r\n')"
            apk_version_name="$("$apkanalyzer" manifest version-name "$ANDROID_V2_APK" | tr -d '\r\n')"
            min_sdk="$("$apkanalyzer" manifest min-sdk "$ANDROID_V2_APK" | tr -d '\r\n')"
            target_sdk="$("$apkanalyzer" manifest target-sdk "$ANDROID_V2_APK" | tr -d '\r\n')"
          else
            aapt="$(find "$ANDROID_HOME/build-tools" -type f -name aapt | sort -V | tail -n 1)"
            [[ -x "$aapt" ]] || { echo "Neither apkanalyzer nor aapt was found"; exit 1; }
            echo "Reading APK metadata with $aapt"
            badging="$("$aapt" dump badging "$ANDROID_V2_APK")"
            application_id="$(printf '%s\n' "$badging" | sed -n "s/^package: name='\([^']*\)'.*/\1/p" | sed -n '1p')"
            apk_version_code="$(printf '%s\n' "$badging" | sed -n "s/^package:.* versionCode='\([^']*\)'.*/\1/p" | sed -n '1p')"
            apk_version_name="$(printf '%s\n' "$badging" | sed -n "s/^package:.* versionName='\([^']*\)'.*/\1/p" | sed -n '1p')"
            min_sdk="$(printf '%s\n' "$badging" | sed -n "s/^sdkVersion:'\([^']*\)'.*/\1/p" | sed -n '1p')"
            target_sdk="$(printf '%s\n' "$badging" | sed -n "s/^targetSdkVersion:'\([^']*\)'.*/\1/p" | sed -n '1p')"
          fi

          for field in application_id apk_version_code apk_version_name min_sdk target_sdk; do
            [[ -n "${!field}" ]] || { echo "Unable to resolve APK metadata field: $field"; exit 1; }
          done

          {
            echo "ANDROID_V2_APPLICATION_ID=$application_id"
            echo "ANDROID_V2_APK_VERSION_CODE=$apk_version_code"
            echo "ANDROID_V2_APK_VERSION_NAME=$apk_version_name"
            echo "ANDROID_V2_MIN_SDK=$min_sdk"
            echo "ANDROID_V2_TARGET_SDK=$target_sdk"
          } >> "$GITHUB_ENV"

          echo "applicationId=$application_id"
          echo "versionName=$apk_version_name"
          echo "versionCode=$apk_version_code"
          echo "minSdk=$min_sdk"
          echo "targetSdk=$target_sdk"

      - name: Generate release manifest, notes and checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/android-v2
          dist_apk="dist/android-v2/nowen-video-android-v2-${ANDROID_VERSION_NAME}.apk"
          dist_aab="dist/android-v2/nowen-video-android-v2-${ANDROID_VERSION_NAME}.aab"
          cp "$ANDROID_V2_APK" "$dist_apk"
          cp "$ANDROID_V2_AAB" "$dist_aab"

          python3 scripts/android-v2-release-manifest.py \
            --apk "$dist_apk" \
            --aab "$dist_aab" \
            --output dist/android-v2/release-manifest.json \
            --checksums-output dist/android-v2/SHA256SUMS.txt \
            --version-name "$ANDROID_VERSION_NAME" \
            --version-code "$ANDROID_VERSION_CODE" \
            --apk-version-name "$ANDROID_V2_APK_VERSION_NAME" \
            --apk-version-code "$ANDROID_V2_APK_VERSION_CODE" \
            --application-id "$ANDROID_V2_APPLICATION_ID" \
            --min-sdk "$ANDROID_V2_MIN_SDK" \
            --target-sdk "$ANDROID_V2_TARGET_SDK" \
            --certificate-sha256 "$ANDROID_V2_APK_CERTIFICATE_SHA256"

          python3 - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("dist/android-v2/release-manifest.json").read_text(encoding="utf-8"))
          artifacts = {item["type"]: item for item in manifest["artifacts"]}
          release_status = (
              "这是预发布测试版本，建议先在非关键设备上完成真机 P0 验证。"
              if manifest["channel"] != "stable"
              else "这是 Android V2 正式版本。"
          )
          replacements = {
              "{{RELEASE_STATUS}}": release_status,
              "{{VERSION_NAME}}": manifest["version"]["name"],
              "{{VERSION_CODE}}": str(manifest["version"]["code"]),
              "{{SOURCE_COMMIT}}": manifest["source"]["commit"],
              "{{CERTIFICATE_SHA256}}": manifest["signing"]["certificate_sha256"],
              "{{APK_SHA256}}": artifacts["apk"]["sha256"],
              "{{AAB_SHA256}}": artifacts["aab"]["sha256"],
          }
          notes = Path("clients/android-v2/RELEASE_NOTES_TEMPLATE.md").read_text(encoding="utf-8")
          for marker, value in replacements.items():
              notes = notes.replace(marker, value)
          if "{{" in notes:
              raise SystemExit("Unresolved Android V2 release notes placeholder")
          Path("dist/android-v2/RELEASE_NOTES.md").write_text(notes, encoding="utf-8")
          PY

          (
            cd dist/android-v2
            sha256sum -c SHA256SUMS.txt
            python3 -m json.tool release-manifest.json > /dev/null
          )
          cat dist/android-v2/release-manifest.json
          ls -la dist/android-v2

      - name: Upload signed Android V2 artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: nowen-video-android-v2-release
          path: dist/android-v2/*
          if-no-files-found: error
          retention-days: 30

  release:
    name: Create draft Android V2 release
    needs: build
    if: startsWith(github.ref, 'refs/tags/android-v2-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nowen-video-android-v2-release
          path: artifacts

      - name: Create GitHub Release draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(needs.build.outputs.version_name, '-') }}
          generate_release_notes: true
          body_path: artifacts/RELEASE_NOTES.md
          name: Nowen Video Android V2 ${{ needs.build.outputs.version_name }}
          files: artifacts/*
