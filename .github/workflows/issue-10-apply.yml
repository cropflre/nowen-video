name: apply-issue-10-tmdb-proxy

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/issue-10-apply.yml

permissions:
  contents: write
  issues: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Apply, test and commit
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            python3 .github/issue10/patch_config.py
            python3 .github/issue10/patch_metadata.py
            python3 .github/issue10/patch_handler.py
            python3 .github/issue10/patch_frontend.py
            python3 .github/issue10/patch_admin_page.py
            python3 .github/issue10/patch_docs.py
            cp .github/issue10/templates/tmdb_network_proxy.go.txt internal/service/tmdb_network_proxy.go
            cp .github/issue10/templates/tmdb_network_proxy_test.go.txt internal/service/tmdb_network_proxy_test.go
            cp .github/issue10/templates/admin_tmdb_proxy.go.txt internal/handler/admin_tmdb_proxy.go
            cp .github/issue10/templates/admin_tmdb_proxy_test.go.txt internal/handler/admin_tmdb_proxy_test.go
            cp .github/issue10/templates/TMDbProxySettings.tsx.txt web/src/components/admin/TMDbProxySettings.tsx
            gofmt -w internal/config/config.go internal/service/metadata.go internal/service/tmdb_network_proxy.go internal/service/tmdb_network_proxy_test.go internal/handler/admin_metadata.go internal/handler/admin_tmdb_proxy.go internal/handler/admin_tmdb_proxy_test.go
            go test ./internal/config ./internal/service ./internal/handler
            cd web
            npm ci
            npm run build
            cd ..
            git diff --check
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git rm -r .github/issue10 .github/workflows/issue-10-apply.yml
            git add internal/config/config.go internal/service/metadata.go internal/service/tmdb_network_proxy.go internal/service/tmdb_network_proxy_test.go internal/handler/admin_metadata.go internal/handler/admin_tmdb_proxy.go internal/handler/admin_tmdb_proxy_test.go web/src/types/index.ts web/src/api/admin.ts web/src/pages/AdminPage.tsx web/src/components/admin/TMDbProxySettings.tsx config.example.yaml
            git commit -m 'feat(tmdb): support HTTP and SOCKS network proxies (#10)'
            git push origin HEAD:main
          ) 2>&1 | tee /tmp/issue10.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            { echo '自动实现验证失败，以下为日志末尾：'; echo '```text'; tail -n 120 /tmp/issue10.log; echo '```'; } > /tmp/issue10-comment.md
            gh issue comment 10 --body-file /tmp/issue10-comment.md || true
            exit "$status"
          fi
