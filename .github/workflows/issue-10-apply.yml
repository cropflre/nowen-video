name: apply-issue-10-tmdb-proxy

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/issue-10-apply.yml

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Apply issue #10 implementation
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def read(path: str) -> str:
              return Path(path).read_text(encoding='utf-8')

          def write(path: str, content: str) -> None:
              Path(path).parent.mkdir(parents=True, exist_ok=True)
              Path(path).write_text(content, encoding='utf-8')

          def replace_once(path: str, old: str, new: str) -> None:
              content = read(path)
              count = content.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected exactly one match, found {count}: {old[:80]!r}')
              write(path, content.replace(old, new, 1))

          def replace_between(path: str, start: str, end: str, new: str) -> None:
              content = read(path)
              start_index = content.find(start)
              if start_index < 0:
                  raise SystemExit(f'{path}: start marker not found: {start!r}')
              end_index = content.find(end, start_index + len(start))
              if end_index < 0:
                  raise SystemExit(f'{path}: end marker not found: {end!r}')
              write(path, content[:start_index] + new + '\n\n' + content[end_index:])

