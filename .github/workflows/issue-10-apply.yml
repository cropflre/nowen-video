          admin_proxy_block = r'''// ==================== TMDb 代理配置 ====================

// UpdateTMDbProxyRequest 更新 TMDb 连接配置。
// APIProxy / ImageProxy 是反向代理 Base URL；NetworkProxy 是 HTTP/SOCKS 网络出口代理。
type UpdateTMDbProxyRequest struct {
    APIProxy     string `json:"api_proxy"`
    ImageProxy   string `json:"image_proxy"`
    NetworkProxy string `json:"network_proxy"`
}

// validateTMDbProxyURL 校验反向代理 Base URL，允许空字符串（表示使用官方地址）。
func validateTMDbProxyURL(raw string) (string, error) {
    value := strings.TrimSpace(raw)
    if value == "" {
        return "", nil
    }
    parsed, err := url.Parse(value)
    if err != nil {
        return "", fmt.Errorf("地址解析失败: %w", err)
    }
    if parsed.Scheme != "http" && parsed.Scheme != "https" {
        return "", fmt.Errorf("反向代理 Base URL 必须以 http:// 或 https:// 开头")
    }
    if parsed.Host == "" {
        return "", fmt.Errorf("反向代理 Base URL 缺少主机")
    }
    return strings.TrimRight(value, "/"), nil
}

// UpdateTMDbProxy 更新 TMDb 反向代理和网络出口代理。
// PUT /api/admin/settings/tmdb/proxy
func (h *AdminHandler) UpdateTMDbProxy(c *gin.Context) {
    var req UpdateTMDbProxyRequest
    if err := c.ShouldBindJSON(&req); err != nil {
        c.JSON(http.StatusBadRequest, gin.H{"error": "请求体格式错误"})
        return
    }

    apiProxy, err := validateTMDbProxyURL(req.APIProxy)
    if err != nil {
        c.JSON(http.StatusBadRequest, gin.H{"error": "API 反向代理无效: " + err.Error()})
        return
    }
    imageProxy, err := validateTMDbProxyURL(req.ImageProxy)
    if err != nil {
        c.JSON(http.StatusBadRequest, gin.H{"error": "图片反向代理无效: " + err.Error()})
        return
    }
    networkProxy, err := service.NormalizeTMDbNetworkProxy(req.NetworkProxy)
    if err != nil {
        c.JSON(http.StatusBadRequest, gin.H{"error": "HTTP/SOCKS 网络代理无效: " + err.Error()})
        return
    }

    if err := h.cfg.SetTMDbAPIProxy(apiProxy); err != nil {
        h.logger.Errorf("保存 TMDb API 反向代理失败: %v", err)
        c.JSON(http.StatusInternalServerError, gin.H{"error": "保存配置失败: " + err.Error()})
        return
    }
    if err := h.cfg.SetTMDbImageProxy(imageProxy); err != nil {
        h.logger.Errorf("保存 TMDb 图片反向代理失败: %v", err)
        c.JSON(http.StatusInternalServerError, gin.H{"error": "保存配置失败: " + err.Error()})
        return
    }
    if err := h.cfg.SetTMDbNetworkProxy(networkProxy); err != nil {
        h.logger.Errorf("保存 TMDb 网络出口代理失败: %v", err)
        c.JSON(http.StatusInternalServerError, gin.H{"error": "保存配置失败: " + err.Error()})
        return
    }

    h.logger.Infof("TMDb 连接配置已更新 (api_base=%q, image_base=%q, network_proxy=%q)", apiProxy, imageProxy, proxyDisplayURL(networkProxy))
    c.JSON(http.StatusOK, gin.H{
        "message": "TMDb 连接配置已保存，立即生效",
        "data": gin.H{
            "api_proxy":     apiProxy,
            "image_proxy":   imageProxy,
            "network_proxy": networkProxy,
        },
    })
}

// ClearTMDbProxy 清除全部 TMDb 代理配置（恢复官方直连）。
func (h *AdminHandler) ClearTMDbProxy(c *gin.Context) {
    setters := []struct {
        name string
        set  func(string) error
    }{
        {"API 反向代理", h.cfg.SetTMDbAPIProxy},
        {"图片反向代理", h.cfg.SetTMDbImageProxy},
        {"网络出口代理", h.cfg.SetTMDbNetworkProxy},
    }
    for _, item := range setters {
        if err := item.set(""); err != nil {
            c.JSON(http.StatusInternalServerError, gin.H{"error": "清除" + item.name + "失败: " + err.Error()})
            return
        }
    }

    h.logger.Info("TMDb 代理配置已清除（恢复官方直连）")
    c.JSON(http.StatusOK, gin.H{
        "message": "已恢复 TMDb 官方直连",
        "data": gin.H{
            "api_proxy":     "",
            "image_proxy":   "",
            "network_proxy": "",
        },
    })
}

// TestTMDbProxyRequest 测试完整 TMDb 路由。指针用于区分“字段未传”和“明确传空”。
type TestTMDbProxyRequest struct {
    APIProxy     *string `json:"api_proxy"`
    ImageProxy   *string `json:"image_proxy"`
    NetworkProxy *string `json:"network_proxy"`
}

// TestTMDbProxy 测试反向代理 Base URL + HTTP/SOCKS 网络出口的完整链路，不持久化。
func (h *AdminHandler) TestTMDbProxy(c *gin.Context) {
    var req TestTMDbProxyRequest
    _ = c.ShouldBindJSON(&req)

    apiProxy := optionalProxyValue(req.APIProxy, h.cfg.GetTMDbAPIProxy())
    imageProxy := optionalProxyValue(req.ImageProxy, h.cfg.GetTMDbImageProxy())
    networkProxy := optionalProxyValue(req.NetworkProxy, h.cfg.GetTMDbNetworkProxy())

    normalizedAPI, err := validateTMDbProxyURL(apiProxy)
    if err != nil {
        c.JSON(http.StatusBadRequest, gin.H{"error": "API 反向代理无效: " + err.Error()})
        return
    }
    normalizedImage, err := validateTMDbProxyURL(imageProxy)
    if err != nil {
        c.JSON(http.StatusBadRequest, gin.H{"error": "图片反向代理无效: " + err.Error()})
        return
    }
    normalizedNetwork, err := service.NormalizeTMDbNetworkProxy(networkProxy)
    if err != nil {
        c.JSON(http.StatusBadRequest, gin.H{"error": "HTTP/SOCKS 网络代理无效: " + err.Error()})
        return
    }

    apiOK, apiMsg, imageOK, imageMsg := h.metadataService.PingTMDbRouting(normalizedAPI, normalizedImage, normalizedNetwork)
    networkOK := true
    networkMessage := "未启用网络出口代理，使用直接连接"
    if normalizedNetwork != "" {
        networkOK = apiOK || imageOK
        switch {
        case apiOK && imageOK:
            networkMessage = "HTTP/SOCKS 网络代理工作正常"
        case networkOK:
            networkMessage = "网络代理已建立，但仅部分 TMDb 目标可达"
        default:
            networkMessage = "无法通过该网络代理连接 TMDb"
        }
    }

    c.JSON(http.StatusOK, gin.H{
        "data": gin.H{
            "api": gin.H{
                "ok":      apiOK,
                "message": apiMsg,
                "target":  defaultStr(normalizedAPI, "https://api.themoviedb.org"),
            },
            "image": gin.H{
                "ok":      imageOK,
                "message": imageMsg,
                "target":  defaultStr(normalizedImage, "https://image.tmdb.org"),
            },
            "network": gin.H{
                "ok":         networkOK,
                "configured": normalizedNetwork != "",
                "message":    networkMessage,
                "target":     defaultStr(proxyDisplayURL(normalizedNetwork), "官方直连"),
            },
        },
    })
}

func optionalProxyValue(value *string, current string) string {
    if value == nil {
        return strings.TrimSpace(current)
    }
    return strings.TrimSpace(*value)
}

func proxyDisplayURL(raw string) string {
    parsed, err := url.Parse(raw)
    if err != nil || raw == "" {
        return raw
    }
    parsed.User = nil
    return parsed.String()
}

func defaultStr(value, fallback string) string {
    if value == "" {
        return fallback
    }
    return value
}'''
