          admin_logic_block = r'''  // 反向代理 Base URL：程序会在该地址后继续拼接 /3/... 或 /t/p/...
  const validateReverseProxyURL = (raw: string): string | null => {
    const value = raw.trim()
    if (!value) return null
    try {
      const parsed = new URL(value)
      if (!['http:', 'https:'].includes(parsed.protocol)) {
        return '反向代理 Base URL 必须以 http:// 或 https:// 开头'
      }
      if (!parsed.hostname) return '反向代理 Base URL 缺少主机'
      return null
    } catch {
      return '反向代理 Base URL 格式不正确'
    }
  }

  // 网络出口代理：与 curl -x 语义一致，目标仍是 TMDb 官方地址。
  const validateNetworkProxyURL = (raw: string): string | null => {
    const value = raw.trim()
    if (!value) return null
    try {
      const parsed = new URL(value)
      if (!['http:', 'https:', 'socks5:', 'socks5h:'].includes(parsed.protocol)) {
        return '仅支持 http://、https://、socks5:// 或 socks5h://'
      }
      if (!parsed.hostname) return '网络代理地址缺少主机或端口'
      if (parsed.pathname && parsed.pathname !== '/') return '网络代理地址不能包含路径'
      return null
    } catch {
      return '网络代理地址格式不正确'
    }
  }

  const handleSaveTMDbProxy = async () => {
    const apiErr = validateReverseProxyURL(tmdbApiProxy)
    if (apiErr) {
      showTmdbProxyMessage('error', `API 反向代理: ${apiErr}`)
      return
    }
    const imageErr = validateReverseProxyURL(tmdbImageProxy)
    if (imageErr) {
      showTmdbProxyMessage('error', `图片反向代理: ${imageErr}`)
      return
    }
    const networkErr = validateNetworkProxyURL(tmdbNetworkProxy)
    if (networkErr) {
      showTmdbProxyMessage('error', `HTTP/SOCKS 网络代理: ${networkErr}`)
      return
    }

    setTmdbProxySaving(true)
    try {
      const res = await adminApi.updateTMDbProxy(
        tmdbApiProxy.trim(),
        tmdbImageProxy.trim(),
        tmdbNetworkProxy.trim(),
      )
      const data = res.data.data
      setTmdbApiProxy(data.api_proxy)
      setTmdbImageProxy(data.image_proxy)
      setTmdbNetworkProxy(data.network_proxy)
      setTmdbConfig((prev) => prev ? {
        ...prev,
        api_proxy: data.api_proxy,
        image_proxy: data.image_proxy,
        network_proxy: data.network_proxy,
        network_proxy_configured: Boolean(data.network_proxy),
      } : prev)
      showTmdbProxyMessage('success', res.data.message || 'TMDb 连接配置已保存')
    } catch (error: unknown) {
      const message = (error as { response?: { data?: { error?: string } } })?.response?.data?.error || '保存失败，请稍后重试'
      showTmdbProxyMessage('error', message)
    } finally {
      setTmdbProxySaving(false)
    }
  }

  const handleClearTMDbProxy = async () => {
    setTmdbProxySaving(true)
    try {
      await adminApi.clearTMDbProxy()
      setTmdbApiProxy('')
      setTmdbImageProxy('')
      setTmdbNetworkProxy('')
      setTmdbConfig((prev) => prev ? {
        ...prev,
        api_proxy: '',
        image_proxy: '',
        network_proxy: '',
        network_proxy_configured: false,
      } : prev)
      setTmdbProxyResult(null)
      showTmdbProxyMessage('success', '已恢复 TMDb 官方直连')
    } catch {
      showTmdbProxyMessage('error', '清除失败，请稍后重试')
    } finally {
      setTmdbProxySaving(false)
    }
  }

  // 测试完整路由，不保存配置、不验证 API Key。
  const handleTestTMDbProxy = async () => {
    const apiErr = validateReverseProxyURL(tmdbApiProxy)
    if (apiErr) {
      showTmdbProxyMessage('error', `API 反向代理: ${apiErr}`)
      return
    }
    const imageErr = validateReverseProxyURL(tmdbImageProxy)
    if (imageErr) {
      showTmdbProxyMessage('error', `图片反向代理: ${imageErr}`)
      return
    }
    const networkErr = validateNetworkProxyURL(tmdbNetworkProxy)
    if (networkErr) {
      showTmdbProxyMessage('error', `HTTP/SOCKS 网络代理: ${networkErr}`)
      return
    }

    setTmdbProxyTesting(true)
    setTmdbProxyResult(null)
    try {
      const res = await adminApi.testTMDbProxy(
        tmdbApiProxy.trim(),
        tmdbImageProxy.trim(),
        tmdbNetworkProxy.trim(),
      )
      const data = res.data.data
      setTmdbProxyResult(data)
      if (data.api.ok && data.image.ok && data.network.ok) {
        showTmdbProxyMessage('success', '连接测试通过：API、图片和网络出口均正常')
      } else if (data.api.ok || data.image.ok) {
        showTmdbProxyMessage('info', '部分目标可达，请查看下方测试明细')
      } else {
        showTmdbProxyMessage('error', '连接测试失败：TMDb API 与图片均不可达')
      }
    } catch (error: unknown) {
      const message = (error as { response?: { data?: { error?: string } } })?.response?.data?.error || '测试失败，请稍后重试'
      showTmdbProxyMessage('error', message)
    } finally {
      setTmdbProxyTesting(false)
    }
  }'''
