func TestNormalizeTMDbNetworkProxy(t *testing.T) {
    valid := map[string]string{
        "":                              "",
        " http://127.0.0.1:7890/ ":     "http://127.0.0.1:7890",
        "https://proxy.example.com:443": "https://proxy.example.com:443",
        "socks5://127.0.0.1:7891":       "socks5://127.0.0.1:7891",
        "SOCKS5H://proxy.local:1080":     "socks5h://proxy.local:1080",
    }
    for input, expected := range valid {
        actual, err := NormalizeTMDbNetworkProxy(input)
        if err != nil {
            t.Fatalf("NormalizeTMDbNetworkProxy(%q) returned error: %v", input, err)
        }
        if actual != expected {
            t.Fatalf("NormalizeTMDbNetworkProxy(%q) = %q, want %q", input, actual, expected)
        }
    }

    invalid := []string{
        "127.0.0.1:7890",
        "ftp://127.0.0.1:21",
        "http:///missing-host",
        "http://127.0.0.1:7890/path",
        "socks5://127.0.0.1:1080?x=1",
    }
    for _, input := range invalid {
        if _, err := NormalizeTMDbNetworkProxy(input); err == nil {
            t.Fatalf("NormalizeTMDbNetworkProxy(%q) should fail", input)
        }
    }
}

func TestEnableDynamicTMDbNetworkProxyReadsLatestConfig(t *testing.T) {
    cfg := &config.Config{}
    cfg.Secrets.TMDbNetworkProxy = "http://127.0.0.1:7890"
    metadata := &MetadataService{
        cfg:    cfg,
        logger: zap.NewNop().Sugar(),
        client: &http.Client{Transport: &http.Transport{}},
    }

    if err := metadata.EnableDynamicTMDbNetworkProxy(); err != nil {
        t.Fatalf("EnableDynamicTMDbNetworkProxy failed: %v", err)
    }
    transport := metadata.client.Transport.(*http.Transport)
    request, _ := http.NewRequest(http.MethodGet, "https://api.themoviedb.org/3/configuration", nil)

    first, err := transport.Proxy(request)
    if err != nil || first == nil || first.String() != "http://127.0.0.1:7890" {
        t.Fatalf("first proxy = %v, err = %v", first, err)
    }

    cfg.Secrets.TMDbNetworkProxy = "socks5://127.0.0.1:7891"
    second, err := transport.Proxy(request)
    if err != nil || second == nil || second.String() != "socks5://127.0.0.1:7891" {
        t.Fatalf("updated proxy = %v, err = %v", second, err)
    }

    cfg.Secrets.TMDbNetworkProxy = ""
    direct, err := transport.Proxy(request)
    if err != nil || direct != nil {
        t.Fatalf("direct proxy = %v, err = %v; want nil, nil", direct, err)
    }
}
''')

