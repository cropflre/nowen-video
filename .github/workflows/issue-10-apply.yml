import (
    "fmt"
    "net/http"
    "net/url"
    "strings"
    "time"
)

var supportedTMDbNetworkProxySchemes = map[string]struct{}{
    "http":   {},
    "https":  {},
    "socks5": {},
    "socks5h": {},
}

// NormalizeTMDbNetworkProxy validates and normalizes the HTTP/SOCKS proxy URL
// used as the outbound transport for TMDb API and image requests.
func NormalizeTMDbNetworkProxy(raw string) (string, error) {
    value := strings.TrimSpace(raw)
    if value == "" {
        return "", nil
    }

    parsed, err := url.Parse(value)
    if err != nil {
        return "", fmt.Errorf("代理地址解析失败: %w", err)
    }
    scheme := strings.ToLower(parsed.Scheme)
    if _, ok := supportedTMDbNetworkProxySchemes[scheme]; !ok {
        return "", fmt.Errorf("仅支持 http://、https://、socks5:// 或 socks5h://")
    }
    if parsed.Host == "" {
        return "", fmt.Errorf("代理地址缺少主机或端口")
    }
    if parsed.RawQuery != "" || parsed.Fragment != "" {
        return "", fmt.Errorf("网络代理地址不能包含查询参数或片段")
    }
    if parsed.Path != "" && parsed.Path != "/" {
        return "", fmt.Errorf("网络代理地址不能包含路径")
    }

    parsed.Scheme = scheme
    parsed.Path = ""
    return strings.TrimRight(parsed.String(), "/"), nil
}

// EnableDynamicTMDbNetworkProxy installs a proxy selector on the existing TMDb
// transport. The selector reads Config for every request, so changes made in the
// admin page take effect immediately without restarting the server.
func (s *MetadataService) EnableDynamicTMDbNetworkProxy() error {
    if s == nil || s.client == nil {
        return fmt.Errorf("TMDb HTTP 客户端未初始化")
    }
    transport, ok := s.client.Transport.(*http.Transport)
    if !ok || transport == nil {
        return fmt.Errorf("TMDb HTTP Transport 类型不受支持")
    }

    cloned := transport.Clone()
    cloned.Proxy = func(_ *http.Request) (*url.URL, error) {
        normalized, err := NormalizeTMDbNetworkProxy(s.cfg.GetTMDbNetworkProxy())
        if err != nil || normalized == "" {
            return nil, err
        }
        return url.Parse(normalized)
    }
    s.client.Transport = cloned

    normalized, err := NormalizeTMDbNetworkProxy(s.cfg.GetTMDbNetworkProxy())
    if err != nil {
        return err
    }
    if normalized == "" {
        s.logger.Info("TMDb 网络出口：官方直连")
    } else {
        s.logger.Infof("TMDb 网络出口代理已启用：%s", proxyDisplayURL(normalized))
    }
    return nil
}

// PingTMDbRouting tests the complete route: optional reverse-proxy base URLs
// plus an optional HTTP/SOCKS outbound proxy. Both API and image probes use the
// same transport that a real TMDb request would use.
func (s *MetadataService) PingTMDbRouting(apiBase, imageBase, networkProxy string) (apiOK bool, apiMsg string, imageOK bool, imageMsg string) {
    client, err := newTMDbRoutingTestClient(networkProxy)
    if err != nil {
        message := "网络代理配置无效: " + err.Error()
        return false, message, false, message
    }

    apiTarget := strings.TrimRight(strings.TrimSpace(apiBase), "/")
    if apiTarget == "" {
        apiTarget = "https://api.themoviedb.org"
    }
    imageTarget := strings.TrimRight(strings.TrimSpace(imageBase), "/")
    if imageTarget == "" {
        imageTarget = "https://image.tmdb.org"
    }

    apiURL := apiTarget + "/3/configuration?api_key=ping"
    apiReq, reqErr := http.NewRequest(http.MethodGet, apiURL, nil)
    if reqErr != nil {
        apiMsg = "构造请求失败: " + reqErr.Error()
    } else {
        setAPIHeaders(apiReq)
        resp, doErr := client.Do(apiReq)
        if doErr != nil {
            apiMsg = "无法连通: " + doErr.Error()
        } else {
            resp.Body.Close()
            switch resp.StatusCode {
            case http.StatusOK:
                apiOK, apiMsg = true, fmt.Sprintf("可达（HTTP 200，%s）", apiTarget)
            case http.StatusUnauthorized:
                apiOK, apiMsg = true, fmt.Sprintf("可达（HTTP 401，目标已响应，%s）", apiTarget)
            default:
                apiMsg = fmt.Sprintf("HTTP %d（%s）", resp.StatusCode, apiTarget)
            }
        }
    }

    imageURL := imageTarget + "/t/p/w92/wwemzKWzjKYJFfCeiB57q3r4Bcm.png"
    imageReq, reqErr := http.NewRequest(http.MethodHead, imageURL, nil)
    if reqErr != nil {
        imageMsg = "构造请求失败: " + reqErr.Error()
    } else {
        setAPIHeaders(imageReq)
        resp, doErr := client.Do(imageReq)
        if doErr != nil {
            imageMsg = "无法连通: " + doErr.Error()
        } else {
            status := resp.StatusCode
            resp.Body.Close()
            if status == http.StatusMethodNotAllowed || status == http.StatusNotFound {
                getReq, _ := http.NewRequest(http.MethodGet, imageURL, nil)
                setAPIHeaders(getReq)
                if getResp, getErr := client.Do(getReq); getErr == nil {
                    status = getResp.StatusCode
                    getResp.Body.Close()
                }
            }
            switch {
            case status == http.StatusOK:
                imageOK, imageMsg = true, fmt.Sprintf("可达（HTTP 200，%s）", imageTarget)
            case status >= 300 && status < 400:
                imageOK, imageMsg = true, fmt.Sprintf("可达（HTTP %d 重定向，%s）", status, imageTarget)
            default:
                imageMsg = fmt.Sprintf("HTTP %d（%s）", status, imageTarget)
            }
        }
    }
    return
}

func newTMDbRoutingTestClient(networkProxy string) (*http.Client, error) {
    normalized, err := NormalizeTMDbNetworkProxy(networkProxy)
    if err != nil {
        return nil, err
    }

    transport := http.DefaultTransport.(*http.Transport).Clone()
    transport.Proxy = nil
    if normalized != "" {
        parsed, parseErr := url.Parse(normalized)
        if parseErr != nil {
            return nil, parseErr
        }
        transport.Proxy = http.ProxyURL(parsed)
    }

    return &http.Client{
        Timeout:   8 * time.Second,
        Transport: transport,
    }, nil
}

func proxyDisplayURL(raw string) string {
    parsed, err := url.Parse(raw)
    if err != nil {
        return raw
    }
    parsed.User = nil
    return parsed.String()
}
''')

