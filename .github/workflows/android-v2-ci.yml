name: android-v2-ci

on:
  push:
    branches: [main]
    paths:
      - clients/android-v2/**
      - .github/workflows/android-v2-ci.yml
  pull_request:
    paths:
      - clients/android-v2/**
      - .github/workflows/android-v2-ci.yml

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Build native Android V2
        run: |
          chmod +x android/gradlew
          ./android/gradlew -p clients/android-v2 testDebugUnitTest lintDebug assembleDebug --no-daemon --stacktrace
