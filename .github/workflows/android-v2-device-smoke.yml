name: Android V2 Device Smoke

on:
  pull_request:
    paths:
      - 'clients/android-v2/**'
      - 'scripts/android-v2-device-smoke.sh'
      - 'scripts/android-v2-device-p0.py'
      - 'scripts/android_v2_p0/**'
      - 'android/gradlew'
      - 'android/gradlew.bat'
      - 'android/gradle/wrapper/**'
      - '.github/workflows/android-v2-device-smoke.yml'
  push:
    branches: [main]
    paths:
      - 'clients/android-v2/**'
      - 'scripts/android-v2-device-smoke.sh'
      - 'scripts/android-v2-device-p0.py'
      - 'scripts/android_v2_p0/**'
      - 'android/gradlew'
      - 'android/gradlew.bat'
      - 'android/gradle/wrapper/**'
      - '.github/workflows/android-v2-device-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-v2-device-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  launch-smoke:
    name: Android ${{ matrix.android }} launch smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - android: '8.0 / API 26'
            api-level: 26
          - android: '13 / API 33'
            api-level: 33
          - android: '15 / API 35'
            api-level: 35

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Enable KVM access
        shell: bash
        run: |
          sudo chmod 666 /dev/kvm

      - name: Run first-launch smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_2
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: bash scripts/android-v2-device-smoke.sh ${{ matrix.api-level }}

      - name: Upload instrumentation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-v2-device-smoke-api-${{ matrix.api-level }}
          path: |
            android-v2-device-smoke-api-${{ matrix.api-level }}.log
            clients/android-v2/app/build/reports/androidTests/connected/**
            clients/android-v2/app/build/outputs/androidTest-results/connected/**
          if-no-files-found: error
          retention-days: 14
