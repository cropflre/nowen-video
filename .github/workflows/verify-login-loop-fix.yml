name: verify-login-loop-fix

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/verify-login-loop-fix.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and build web
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Verify whitespace
        run: git diff --check HEAD~5..HEAD

      - name: Remove one-time workflow
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/verify-login-loop-fix.yml
          git commit -m 'test(auth): verify login loop regression fix'
          git push origin HEAD:main
