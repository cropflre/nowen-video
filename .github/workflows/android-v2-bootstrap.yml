name: android-v2-bootstrap

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/android-v2-bootstrap.yml
      - .github/android-v2-bootstrap.tar.gz.b64

permissions:
  contents: write

concurrency:
  group: android-v2-bootstrap-main
  cancel-in-progress: false

jobs:
  verify-and-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Materialize Android V2
        shell: bash
        run: |
          set -euo pipefail
          test -f .github/android-v2-bootstrap.tar.gz.b64
          base64 --decode .github/android-v2-bootstrap.tar.gz.b64 > /tmp/android-v2-bootstrap.tar.gz
          tar -xzf /tmp/android-v2-bootstrap.tar.gz
          test -f android-v2/settings.gradle.kts
          test -f android-v2/app/build.gradle.kts

      - name: Verify Android V2
        shell: bash
        run: |
          set -euo pipefail
          chmod +x android/gradlew
          ./android/gradlew -p android-v2 clean testDebugUnitTest lintDebug assembleDebug --no-daemon --stacktrace
          git diff --check

      - name: Commit verified implementation
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/android-v2-bootstrap.tar.gz.b64
          rm -f .github/workflows/android-v2-bootstrap.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A android-v2 .github
          git diff --cached --check
          git commit -m 'feat(android): add native Android V2 foundation'
          git push origin HEAD:main
