name: Android V2

on:
  pull_request:
    paths:
      - 'clients/android-v2/**'
      - '.github/workflows/android-v2.yml'
  push:
    branches: [main]
    paths:
      - 'clients/android-v2/**'
      - '.github/workflows/android-v2.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-v2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        shell: bash
        run: yes | sdkmanager 'platforms;android-35' 'build-tools;35.0.0' >/dev/null

      - name: Unit tests, lint and debug APK
        shell: bash
        run: |
          chmod +x android/gradlew
          ./android/gradlew -p clients/android-v2 \
            testDebugUnitTest lintDebug assembleDebug \
            --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nowen-video-android-v2-debug
          path: clients/android-v2/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
