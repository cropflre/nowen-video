name: Android V2

on:
  pull_request:
    paths:
      - 'clients/android-v2/**'
      - '.github/workflows/android-v2.yml'
  push:
    branches: [main]
    paths:
      - 'clients/android-v2/**'
      - '.github/workflows/android-v2.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-v2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Unit tests, lint and debug APK
        id: gradle
        shell: bash
        run: |
          set +e
          chmod +x android/gradlew
          ./android/gradlew -p clients/android-v2 \
            testDebugUnitTest lintDebug assembleDebug \
            --no-daemon --stacktrace 2>&1 | tee android-v2-build.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nowen-video-android-v2-build-log
          path: android-v2-build.log
          if-no-files-found: error

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nowen-video-android-v2-debug
          path: clients/android-v2/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
