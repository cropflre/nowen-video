name: Android V2

on:
  pull_request:
    paths:
      - 'clients/android-v2/**'
      - 'scripts/android-v2-version.sh'
      - 'scripts/android-v2-release-manifest.py'
      - 'scripts/android-v2-signing-preflight.sh'
      - 'scripts/android-v2-release-candidate.sh'
      - 'scripts/android-v2-device-p0.py'
      - 'scripts/android_v2_p0/**'
      - 'cmd/server/main.go'
      - 'internal/handler/**'
      - 'internal/middleware/**'
      - 'internal/model/**'
      - 'internal/repository/**'
      - 'internal/service/**'
      - 'internal/version/**'
      - 'android/gradlew'
      - 'android/gradlew.bat'
      - 'android/gradle/wrapper/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/android-v2.yml'
  push:
    branches: [main]
    paths:
      - 'clients/android-v2/**'
      - 'scripts/android-v2-version.sh'
      - 'scripts/android-v2-release-manifest.py'
      - 'scripts/android-v2-signing-preflight.sh'
      - 'scripts/android-v2-release-candidate.sh'
      - 'scripts/android-v2-device-p0.py'
      - 'scripts/android_v2_p0/**'
      - 'cmd/server/main.go'
      - 'internal/handler/**'
      - 'internal/middleware/**'
      - 'internal/model/**'
      - 'internal/repository/**'
      - 'internal/service/**'
      - 'internal/version/**'
      - 'android/gradlew'
      - 'android/gradlew.bat'
      - 'android/gradle/wrapper/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/android-v2.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-v2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Android release policy tests
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/android-v2-version.sh --self-test
          python3 scripts/android-v2-release-manifest.py --self-test
          bash scripts/android-v2-signing-preflight.sh --self-test
          bash scripts/android-v2-release-candidate.sh --self-test
          python3 -Werror scripts/android-v2-device-p0.py self-test

      - name: Backend contract tests
        id: go
        continue-on-error: true
        shell: bash
        run: |
          set +e
          go test ./internal/service ./internal/handler 2>&1 | tee android-v2-go-test.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Unit tests, instrumentation compile, lint, debug and release builds
        id: gradle
        continue-on-error: true
        shell: bash
        run: |
          set +e
          chmod +x android/gradlew
          ./android/gradlew -p clients/android-v2 \
            testDebugUnitTest assembleDebugAndroidTest lintDebug assembleDebug assembleRelease \
            --no-daemon --stacktrace 2>&1 | tee android-v2-build.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nowen-video-android-v2-build-log
          path: |
            android-v2-go-test.log
            android-v2-build.log
          if-no-files-found: error
          retention-days: 14

      - name: Enforce verification gate
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.go.outputs.status }}" != "0" || "${{ steps.gradle.outputs.status }}" != "0" ]]; then
            echo "Backend or Android V2 verification failed."
            exit 1
          fi

      - name: Upload debug APK
        if: steps.gradle.outputs.status == '0'
        uses: actions/upload-artifact@v4
        with:
          name: nowen-video-android-v2-debug
          path: clients/android-v2/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload unsigned release APK
        if: steps.gradle.outputs.status == '0'
        uses: actions/upload-artifact@v4
        with:
          name: nowen-video-android-v2-release-unsigned
          path: clients/android-v2/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14
