version: '3.8'

services:
  nowen-video:
    build: .
    container_name: nowen-video
    ports:
      - "8080:8080"
    volumes:
      # 数据持久化
      - ./data:/data
      # 转码缓存
      - ./cache:/cache
      # 媒体文件挂载（根据实际NAS路径修改）
      # 方式1: 挂载整个媒体根目录
      - /volume1/Media:/media
      # 方式2: 分别挂载不同媒体目录（取消注释并注释方式1）
      # - /volume1/Media/电影:/media/电影
      # - /volume1/Media/电视剧:/media/电视剧
      # 群晖/绿联NAS：挂载GPU设备以支持硬件加速
      # 如果没有硬件加速需求可以注释掉
    devices:
      - /dev/dri:/dev/dri
    environment:
      # ---- 应用配置 ----
      - NOWEN_APP_PORT=8080
      # ---- 用户权限（NAS场景重要！设置为宿主机媒体目录的 UID/GID）----
      # 绿联NAS通常用 PUID=0 PGID=0（root），或通过 `id` 命令查看实际值
      # - PUID=1000
      # - PGID=1000
      - NOWEN_APP_DATA_DIR=/data
      - NOWEN_APP_WEB_DIR=/app/web/dist
      - NOWEN_APP_HW_ACCEL=auto
      - NOWEN_APP_TRANSCODE_PRESET=veryfast
      - NOWEN_APP_MAX_TRANSCODE_JOBS=2
      # ---- 数据库配置 ----
      - NOWEN_DATABASE_DB_PATH=/data/nowen.db
      # ---- 密钥配置（⚠️ 请务必修改） ----
      - NOWEN_SECRETS_JWT_SECRET=please-change-this-secret-key
      # ---- 缓存配置 ----
      - NOWEN_CACHE_CACHE_DIR=/cache
      # ---- 日志配置 ----
      - NOWEN_LOGGING_LEVEL=info
      # ---- CORS（多个用逗号分隔，留空禁止跨域，*允许所有） ----
      # - NOWEN_APP_CORS_ORIGINS=http://localhost:3000
      - TZ=Asia/Shanghai
    privileged: true
    restart: unless-stopped
    # 资源限制（NAS场景建议限制，避免拖垮系统）
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
