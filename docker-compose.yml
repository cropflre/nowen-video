version: '3.8'

services:
  nowen-video:
    build:
      context: .
      # 多架构构建（使用 docker buildx 时生效）
      # 本机架构会自动选择，如需强制指定可取消注释：
      # platforms:
      #   - linux/amd64
      #   - linux/arm64
    # 如果在 x86 主机上拉取 ARM 镜像（或反之），可通过 platform 显式指定
    # platform: linux/arm64
    container_name: nowen-video
    ports:
      - "8080:8080"
    volumes:
      # 数据持久化
      - ./data:/data
      # 转码缓存
      - ./cache:/cache
      # 媒体文件挂载（根据实际NAS路径修改）
      # 示例: 挂载整个媒体根目录
      # - /volume1/Media:/media
      # 示例: 分别挂载不同媒体目录
      # - /volume1/Media/电影:/media/电影
      # - /volume1/Media/电视剧:/media/电视剧
    # 硬件加速设备映射
    # - amd64 (Intel QSV/VAAPI): /dev/dri
    # - arm64 (树莓派 V4L2 / 瑞芯微 RKMPP / Mali GPU): /dev/dri, /dev/video*
    # 如果没有硬件加速需求可以注释掉整个 devices 段
    devices:
      - /dev/dri:/dev/dri
      # ARM SBC 额外可能需要的设备（按需开启）
      # - /dev/video10:/dev/video10   # 树莓派 V4L2 H.264 编码
      # - /dev/video11:/dev/video11
      # - /dev/video12:/dev/video12
      # - /dev/mpp_service:/dev/mpp_service  # 瑞芯微 RKMPP
    environment:
      # ---- 应用配置 ----
      - NOWEN_APP_PORT=8080
      # ---- 用户权限（NAS场景重要！设置为宿主机媒体目录的 UID/GID）----
      # 绿联NAS通常用 PUID=0 PGID=0（root），或通过 `id` 命令查看实际值
      # - PUID=1000
      # - PGID=1000
      - NOWEN_APP_DATA_DIR=/data
      - NOWEN_APP_WEB_DIR=/app/web/dist
      - NOWEN_APP_HW_ACCEL=auto  # 自动检测硬件加速（可选: auto/qsv/vaapi/nvenc/none）
      - NOWEN_APP_TRANSCODE_PRESET=veryfast
      - NOWEN_APP_MAX_TRANSCODE_JOBS=2
      # ---- 数据库配置 ----
      - NOWEN_DATABASE_DB_PATH=/data/nowen.db
      # ---- 密钥配置（⚠️ 请务必修改） ----
      - NOWEN_SECRETS_JWT_SECRET=please-change-this-secret-key
      # ---- 缓存配置 ----
      - NOWEN_CACHE_CACHE_DIR=/cache
      # ---- 日志配置 ----
      - NOWEN_LOGGING_LEVEL=info
      # ---- CORS（多个用逗号分隔，留空禁止跨域，*允许所有） ----
      # - NOWEN_APP_CORS_ORIGINS=http://localhost:3000
      - TZ=Asia/Shanghai
    privileged: true
    restart: unless-stopped
    # 资源限制（NAS场景建议限制，避免拖垮系统）
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
