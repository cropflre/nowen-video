# ==================== nowen-video 配置文件 ====================
#
# 配置加载优先级（从低到高）：
#   1. 内置默认值
#   2. 本文件（config.yaml）—— 支持旧版扁平格式和新版嵌套格式
#   3. config/ 目录下的分片配置文件（database.yaml, secrets.yaml 等）
#   4. 环境变量（NOWEN_ 前缀，如 NOWEN_APP_PORT=8080）
#
# 推荐方式：使用 config/ 目录下的分片配置文件，便于分类管理和安全隔离。
# 也可以继续使用本文件的扁平格式，系统会自动向后兼容。
#
# 分片配置文件说明：
#   config/database.yaml  - 数据库连接参数
#   config/secrets.yaml   - JWT密钥、第三方API密钥（⚠️ 勿提交到Git）
#   config/app.yaml       - 应用运行环境配置
#   config/logging.yaml   - 日志记录设置
#   config/cache.yaml     - 缓存配置参数

# ==================== 新版嵌套格式示例 ====================

# 数据库配置
database:
  db_path: ./data/nowen.db
  wal_mode: true
  busy_timeout: 5000
  cache_size: -20000

# 敏感信息（建议迁移到 config/secrets.yaml）
secrets:
  jwt_secret: please-change-this-secret-key
  tmdb_api_key: ""

# 应用配置
app:
  port: 8080
  debug: false
  env: production
  data_dir: ./data
  web_dir: ./web/dist
  ffmpeg_path: ffmpeg
  ffprobe_path: ffprobe
  vaapi_device: /dev/dri/renderD128   # Linux Intel 核显逗生门，普通用户无需修改
  cors_origins: []

# ==================== 转码调度 / HLS ABR / 节流 / GPU 安全 ====================
# 【最佳性能策略】所有转码相关行为均为内建自适应，无需任何配置：
#   - 硬件加速：启动时自动检测 NVENC / QSV / VAAPI，都不可用则回落 CPU。
#   - 并发转码：worker 数量固定为 NumCPU/2，保留一半核心给系统和播放。
#   - FFmpeg 线程：-threads 0（FFmpeg 自探测，用满所有 CPU 核心）。
#   - 编码预设：固定 ultrafast（速度优先，硬件编码有其自身的自适应 tune）。
#   - ABR：前端请求 master.m3u8 时并行预转码所有可用档位，hls.js 根据实时带宽切换。
#   - 节流：转码前沿领先播放 > 60s 时挂起 FFmpeg，< 15s 时唤醒。
#   - GPU 安全限流：默认启用，阈值 85%/80℃ 触发降级，60%/70℃ 恢复。

# 日志配置
logging:
  level: info
  format: console
  output_path: ""
  error_output_path: ""
  enable_rotation: false
  max_size_mb: 100
  max_age_days: 30
  max_backups: 10

# 缓存配置
cache:
  cache_dir: ./cache
  max_disk_usage_mb: 0
  ttl_hours: 0
  auto_cleanup: false
  cleanup_interval_min: 60

# ==================== Emby / Jellyfin 兼容层配置 ====================
# 用于移动端 Emby/Infuse/Jellyfin 客户端登录与播放。无需客户端额外配置，
# 将手机客户端的"服务器地址"填为 http://<server-ip>:8080 即可登录。
emby:
  # 对外显示的服务器名称（留空则使用主机名）
  server_name: ""
  # 是否启用 UDP 7359 局域网服务器自动发现（Emby/Jellyfin 标准协议）
  # 开启后同网段的手机客户端在"添加服务器"时会自动发现本机，无需手动输入 IP
  enable_auto_discovery: true
  # 自动发现监听端口（标准 7359，一般无需修改）
  auto_discovery_port: 7359
  # 是否在登录页公开用户列表（true=显示用户头像可点击登录；false=必须手动输入用户名）
  public_user_list_enabled: false
  # 是否启用 WebSocket 长连接（消除客户端连接失败告警）
  enable_websocket: true
  # 登录页免责声明（Jellyfin 客户端会在登录页展示此文字）
  login_disclaimer: ""
  # 自定义 CSS（仅 Jellyfin Web 客户端使用）
  custom_css: ""

# ==================== 旧版扁平格式（向后兼容）====================
# 如果你使用旧版格式，以下 key 仍然有效：
#
# port: 8080
# debug: false
# data_dir: ./data
# cache_dir: ./cache
# web_dir: ./web/dist
# db_path: ./data/nowen.db
# jwt_secret: please-change-this-secret-key
# ffmpeg_path: ffmpeg
# ffprobe_path: ffprobe
# vaapi_device: /dev/dri/renderD128
# tmdb_api_key: ""