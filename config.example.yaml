# ==================== nowen-video 配置文件 ====================
#
# 配置加载优先级（从低到高）：
#   1. 内置默认值
#   2. 本文件（config.yaml）—— 支持旧版扁平格式和新版嵌套格式
#   3. config/ 目录下的分片配置文件（database.yaml, secrets.yaml 等）
#   4. 环境变量（NOWEN_ 前缀，如 NOWEN_APP_PORT=8080）
#
# 推荐方式：使用 config/ 目录下的分片配置文件，便于分类管理和安全隔离。
# 也可以继续使用本文件的扁平格式，系统会自动向后兼容。
#
# 分片配置文件说明：
#   config/database.yaml  - 数据库连接参数
#   config/secrets.yaml   - JWT密钥、第三方API密钥（⚠️ 勿提交到Git）
#   config/app.yaml       - 应用运行环境配置
#   config/logging.yaml   - 日志记录设置
#   config/cache.yaml     - 缓存配置参数

# ==================== 新版嵌套格式示例 ====================

# 数据库配置
database:
  db_path: ./data/nowen.db
  wal_mode: true
  busy_timeout: 5000
  cache_size: -20000

# 敏感信息（建议迁移到 config/secrets.yaml）
secrets:
  jwt_secret: please-change-this-secret-key
  tmdb_api_key: ""

# 应用配置
app:
  port: 8080
  debug: false
  env: production
  data_dir: ./data
  web_dir: ./web/dist
  ffmpeg_path: ffmpeg
  ffprobe_path: ffprobe
  hw_accel: none
  vaapi_device: /dev/dri/renderD128
  transcode_preset: ultrafast
  max_transcode_jobs: 1
  resource_limit: 70    # CPU资源限制百分比（1-80），建议60-80，过低会导致预处理任务无法执行
  cors_origins: []

# ==================== 转码调度 / HLS ABR / 节流 ====================
# 上述能力均为内建行为，当前无需独立配置：
#   - ABR（多码率自适应）：前端请求 /api/stream/:id/master.m3u8 时，后端会并行预转码
#     所有可用档位（默认 360p/480p/720p/1080p/2K/4K，根据原片分辨率自动裁剪）。
#     hls.js 在客户端端根据实时带宽在档位间无缝切换。
#   - 客户端带宽协商：hls.js 会通过 POST /api/stream/:id/bandwidth 上报 EWMA 评估带宽，
#     前端据此在下次请求 master.m3u8 时带上 ?maxBitrate=xxx，弱网自动降档。
#     Emby/Infuse 客户端则通过 PlaybackInfo 的 MaxStreamingBitrate 字段协商。
#   - 节流（Throttling）：客户端通过 /api/stream/:id/playback 上报当前播放位置，
#     服务端对比"转码前沿"与"播放前沿"：
#       * 领先 > 60s 时挂起 FFmpeg（Linux: SIGSTOP / Windows: NtSuspendProcess）
#       * 领先 < 15s 时唤醒 FFmpeg
#     可通过 GET /admin/transcode/throttle 查看节流累积统计（节省的 GPU 时间）。
#   - GPU 安全限流：gpu_safety_* 系列配置详见下方 gpu 小节（暂未独立暴露，默认启用）。

# 日志配置
logging:
  level: info
  format: console
  output_path: ""
  error_output_path: ""
  enable_rotation: false
  max_size_mb: 100
  max_age_days: 30
  max_backups: 10

# 缓存配置
cache:
  cache_dir: ./cache
  max_disk_usage_mb: 0
  ttl_hours: 0
  auto_cleanup: false
  cleanup_interval_min: 60

# ==================== Emby / Jellyfin 兼容层配置 ====================
# 用于移动端 Emby/Infuse/Jellyfin 客户端登录与播放。无需客户端额外配置，
# 将手机客户端的"服务器地址"填为 http://<server-ip>:8080 即可登录。
emby:
  # 对外显示的服务器名称（留空则使用主机名）
  server_name: ""
  # 是否启用 UDP 7359 局域网服务器自动发现（Emby/Jellyfin 标准协议）
  # 开启后同网段的手机客户端在"添加服务器"时会自动发现本机，无需手动输入 IP
  enable_auto_discovery: true
  # 自动发现监听端口（标准 7359，一般无需修改）
  auto_discovery_port: 7359
  # 是否在登录页公开用户列表（true=显示用户头像可点击登录；false=必须手动输入用户名）
  public_user_list_enabled: false
  # 是否启用 WebSocket 长连接（消除客户端连接失败告警）
  enable_websocket: true
  # 登录页免责声明（Jellyfin 客户端会在登录页展示此文字）
  login_disclaimer: ""
  # 自定义 CSS（仅 Jellyfin Web 客户端使用）
  custom_css: ""

# ==================== 旧版扁平格式（向后兼容） ====================
# 如果你使用旧版格式，以下 key 仍然有效：
#
# port: 8080
# debug: false
# data_dir: ./data
# cache_dir: ./cache
# web_dir: ./web/dist
